<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/button.css">
    <style>
        .card {width:50%; margin:5px auto;}
        .input {width:100%;}
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a class="brand" href="./index.html">📚 Library</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <section class="card">
            <h2>로그인</h2>
            <form id="loginForm" action="" method="">
                <div class="form_group">
                    <input class="input" id="loginId" type="text" placeholder="아이디">
                    <input class="input" id="loginPw" type="password" placeholder="비밀번호">
                    <button type="submit" class="btn special">로그인(데모)</button>
                    <div class="muted" style="font-size:1.3rem;">계정이 없으신가요? <a class="btn" href="./signup.html">회원가입</a></div>
                </div>
            </form>
        </section>
    </main>

    <script src="./js/login.js"></script>
</body>
</html>
